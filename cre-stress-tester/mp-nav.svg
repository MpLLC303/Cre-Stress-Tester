<!-- NAV VARIANT · 40x40 · gold gradient · optimized for 28-36px display -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="36" height="36" aria-label="MP monogram" role="img">
  <defs>
    <linearGradient id="mp-nav-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4B574"/>
      <stop offset="100%" stop-color="#8C7A4F"/>
    </linearGradient>
  </defs>
  <!-- M: classical Garamond proportions, bracketed serifs top & bottom -->
  <path fill="url(#mp-nav-grad)" d="
    M 4 32
    L 4 8
    L 7 8
    L 13.5 25
    L 20 8
    L 23 8
    L 23 32
    L 20.5 32
    L 20.5 13
    L 14.3 29
    L 12.7 29
    L 6.5 13
    L 6.5 32
    Z"/>
  <!-- Tiny bracketed serifs reinforcing the M's feet -->
  <path fill="url(#mp-nav-grad)" d="M 3 31.5 L 8 31.5 L 8 32.8 L 3 32.8 Z"/>
  <path fill="url(#mp-nav-grad)" d="M 19 31.5 L 24 31.5 L 24 32.8 L 19 32.8 Z"/>
  <!-- P: tucked into the M's right diagonal, bowl overlaps subtly -->
  <path fill="url(#mp-nav-grad)" d="
    M 21 10
    L 21 32
    L 23.8 32
    L 23.8 23
    L 29 23
    Q 36 23 36 16.5
    Q 36 10 29 10
    Z
    M 23.8 12.3
    L 28.7 12.3
    Q 33.3 12.3 33.3 16.5
    Q 33.3 20.7 28.7 20.7
    L 23.8 20.7
    Z"/>
  <!-- P's top serif -->
  <path fill="url(#mp-nav-grad)" d="M 20 9.5 L 25 9.5 L 25 10.8 L 20 10.8 Z"/>
</svg>
